version: '3.8'

services:
  aerospike:
    image: aerospike/aerospike-server-enterprise:latest
    container_name: musicmind-aerospike
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    volumes:
      - aerospike-data:/opt/aerospike/data
      - ./config/aerospike.conf:/etc/aerospike/aerospike.conf:ro
    environment:
      - NAMESPACE=musicmind
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - musicmind-network

  redis:
    image: redis:7-alpine
    container_name: musicmind-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - musicmind-network

volumes:
  aerospike-data:
    driver: local
  redis-data:
    driver: local

networks:
  musicmind-network:
    driver: bridge
