# Aerospike database configuration for MusicMind Agent Platform

service {
    user root
    group root
    paxos-single-replica-limit 1
    pidfile /var/run/aerospike/asd.pid
    proto-fd-max 15000
}

logging {
    file /var/log/aerospike/aerospike.log {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }

    heartbeat {
        mode mesh
        port 3002
        interval 150
        timeout 10
    }

    fabric {
        port 3001
    }

    info {
        port 3003
    }
}

namespace musicmind {
    replication-factor 1
    memory-size 4G
    storage-engine device {
        file /opt/aerospike/data/musicmind.dat
        filesize 16G
        data-in-memory true
    }
}
